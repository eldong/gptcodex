<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>USD Currency Converter</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 2rem auto;
        max-width: 480px;
        line-height: 1.5;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        padding: 1.5rem;
        border: 1px solid #ddd;
        border-radius: 8px;
      }
      label {
        font-weight: 600;
      }
      input,
      select,
      button {
        padding: 0.6rem;
        font-size: 1rem;
      }
      .result,
      .error {
        margin-top: 1rem;
        padding: 0.75rem;
        border-radius: 4px;
      }
      .result {
        background: #f0fdf4;
        border: 1px solid #86efac;
      }
      .error {
        background: #fef2f2;
        border: 1px solid #fecaca;
      }
    </style>
  </head>
  <body>
    <h1>USD Currency Converter</h1>

    <form method="post" action="/convert">
      <div>
        <label for="amount">Amount (USD)</label>
        <input
          id="amount"
          name="amount"
          type="number"
          min="0"
          step="0.01"
          value="{{ amount }}"
          required
        />
      </div>

      <div>
        <label for="currency">Convert to</label>
        <select id="currency" name="currency">
          {% for currency in currencies %}
          <option value="{{ currency }}" {% if currency == selected_currency %}selected{% endif %}>
            {{ currency }}
          </option>
          {% endfor %}
        </select>
      </div>

      <button type="submit">Convert</button>
    </form>

    {% if result %}
    <div class="result">Converted amount: {{ result }} {{ selected_currency }}</div>
    {% endif %}

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
  </body>
</html>
